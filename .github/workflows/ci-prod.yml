name: "CI/CD — Frontend Web React [PROD]"

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: "¿Deployar a AWS S3+CloudFront PROD? (true = deploy, false = solo build/test)"
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ENVIRONMENT: prod
  S3_BUCKET: ${{ secrets.S3_BUCKET_PROD }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_ID_PROD }}

jobs:
  build-and-test:
    name: "Build & Test (React/Vite)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Build (PROD)
        run: npm run build
        env:
          VITE_ENV: production
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL_PROD }}

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-prod
          path: dist/
          retention-days: 1

  deploy:
    name: "Deploy → S3 + CloudFront PROD"
    needs: build-and-test
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.deploy == 'true' }}
    environment: prod  # requiere aprobación manual en GitHub Environments

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-prod
          path: dist/

      - name: Configure AWS Credentials (OIDC → demo-ticketing-prod)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3 PROD
        run: |
          aws s3 sync dist/ s3://${{ env.S3_BUCKET }} \
            --delete \
            --cache-control "max-age=31536000,public" \
            --exclude "index.html"
          aws s3 cp dist/index.html s3://${{ env.S3_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Summary
        run: echo "✅ Frontend deploado a S3 PROD + CloudFront invalidado"
